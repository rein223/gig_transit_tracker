<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作業記録管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
    background: #f0f2f5;
    color: #333;
    min-height: 100vh;
  }
  header {
    background: #1a73e8;
    color: white;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { font-size: 1.2rem; font-weight: 600; }
  header span { font-size: 0.85rem; opacity: 0.85; }

  .container { max-width: 960px; margin: 24px auto; padding: 0 16px; }

  .panel {
    background: white;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .panel-title { font-size: 0.9rem; color: #777; font-weight: 600; }
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .bulk-actions { display: flex; gap: 8px; }

  /* 作業情報フォーム */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-top: 12px;
  }
  .info-field { display: flex; flex-direction: column; gap: 4px; }
  .info-field label { font-size: 0.78rem; color: #888; font-weight: 600; }
  .info-field input {
    padding: 8px 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 0.9rem;
  }
  .info-field input:focus { outline: none; border-color: #1a73e8; }

  /* 作業者追加 */
  .add-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 12px;
  }
  .add-row input {
    flex: 1;
    min-width: 130px;
    padding: 8px 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 0.9rem;
  }
  .add-row input:focus { outline: none; border-color: #1a73e8; }

  .btn {
    padding: 7px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.82; }
  .btn-add    { background: #1a73e8; color: white; }
  .btn-start  { background: #34a853; color: white; }
  .btn-end    { background: #ea4335; color: white; }
  .btn-csv    { background: #fbbc04; color: #333; }
  .btn-clear  { background: #e8eaed; color: #555; }
  .btn-outline{ background: white; color: #555; border: 1px solid #ccc; }
  .btn-remove { background: transparent; color: #ccc; border: none; cursor: pointer; font-size: 1rem; padding: 2px 6px; border-radius: 4px; }
  .btn-remove:hover { color: #ea4335; background: #fce8e6; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* 作業者テーブル */
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  th {
    background: #f8f9fa;
    padding: 9px 10px;
    text-align: left;
    border-bottom: 2px solid #e0e0e0;
    color: #666;
    font-weight: 600;
    font-size: 0.82rem;
  }
  td { padding: 10px 10px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr.working-row td { background: #f0faf3; }

  .status-chip {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 12px;
    font-size: 0.78rem;
    font-weight: 600;
  }
  .status-idle    { background: #e8eaed; color: #666; }
  .status-working { background: #e6f4ea; color: #1e7e34; }

  .timer-cell { font-size: 0.8rem; color: #888; min-width: 110px; }
  .action-cell { display: flex; gap: 6px; align-items: center; }
  .empty-row td { text-align: center; color: #aaa; padding: 20px; }

  /* ログテーブル */
  .log-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .log-actions { display: flex; gap: 8px; }
  .duration-chip {
    background: #e8f0fe;
    color: #1a73e8;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 0.78rem;
    font-weight: 500;
  }
  #emptyMsg { text-align: center; color: #aaa; padding: 20px; font-size: 0.88rem; }

  /* サイン（プレビュー） */
  .sign-area { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
  .sign-label { font-size: 0.78rem; color: #888; font-weight: 600; }
  .sign-preview-wrap {
    border: 2px dashed #ccc;
    border-radius: 8px;
    background: #fafafa;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ccc;
    font-size: 0.85rem;
  }
  .sign-preview { max-width: 50%; max-height: 60px; border-radius: 6px; display: block; }
  .sign-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* フルスクリーン署名モーダル */
  #signModal {
    display: none;
    position: fixed;
    inset: 0;
    background: #fff;
    z-index: 9999;
    flex-direction: column;
  }
  #signModal.open { display: flex; }
  .sign-modal-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    background: #1a73e8;
    color: white;
    flex-shrink: 0;
  }
  .sign-modal-bar span { font-size: 1rem; font-weight: 600; }
  .sign-modal-bar .bar-actions { display: flex; gap: 8px; }
  .btn-white { background: white; color: #1a73e8; border: none; border-radius: 6px; padding: 7px 16px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
  .btn-ghost { background: rgba(255,255,255,0.2); color: white; border: none; border-radius: 6px; padding: 7px 14px; font-size: 0.9rem; cursor: pointer; }
  #signModal canvas {
    flex: 1;
    display: block;
    width: 100%;
    cursor: crosshair;
    touch-action: none;
    background: #fff;
  }
  .sign-modal-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ddd;
    font-size: 1rem;
    pointer-events: none;
    white-space: nowrap;
  }
  .sign-modal-canvas-wrap { position: relative; flex: 1; display: flex; flex-direction: column; }

  @media (max-width: 600px) {
    td, th { padding: 8px 6px; font-size: 0.82rem; }
    .btn { padding: 8px 10px; font-size: 0.82rem; }
    .action-cell { flex-wrap: wrap; }
  }

  /* 印刷 */
  #printArea { display: none; }

  @media print {
    @page { size: A4 portrait; margin: 15mm 15mm 15mm 15mm; }
    * { background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    body > *:not(#printArea) { display: none !important; }
    #printArea {
      display: block !important;
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      font-size: 10pt;
      color: #000;
    }
    #printArea .p-title {
      font-size: 16pt;
      font-weight: bold;
      text-align: center;
      margin-bottom: 14pt;
      border-bottom: 2pt solid #000;
      padding-bottom: 6pt;
    }
    #printArea .p-section { margin-bottom: 14pt; }
    #printArea .p-section-title {
      font-size: 10pt;
      font-weight: bold;
      border-bottom: 1pt solid #000;
      padding: 3pt 0;
      margin-bottom: 6pt;
    }
    #printArea .p-info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6pt;
    }
    #printArea .p-info-item { border: 0.5pt solid #aaa; padding: 4pt 6pt; }
    #printArea .p-info-label { font-size: 8pt; color: #555; margin-bottom: 2pt; }
    #printArea .p-info-value { font-size: 10pt; font-weight: bold; }
    #printArea table { width: 100%; border-collapse: collapse; font-size: 9pt; }
    #printArea th {
      border: 0.5pt solid #aaa;
      padding: 4pt 5pt;
      text-align: left;
      font-weight: bold;
    }
    #printArea td {
      border: 0.5pt solid #aaa;
      padding: 4pt 5pt;
    }
    #printArea .p-sign-row {
      display: flex;
      align-items: flex-start;
      gap: 20pt;
      margin-top: 6pt;
    }
    #printArea .p-sign-box {
      border: 0.5pt solid #aaa;
      width: 240pt;
      height: 80pt;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #printArea .p-sign-box img { max-width: 100%; max-height: 100%; }
    #printArea .p-sign-label { font-size: 8pt; color: #555; margin-bottom: 3pt; }
    #printArea .p-footer {
      margin-top: 20pt;
      font-size: 8pt;
      color: #888;
      text-align: right;
    }
  }
</style>
</head>
<body>

<header>
  <h1>作業記録管理</h1>
  <div style="display:flex;align-items:center;gap:12px;">
    <span id="currentDate"></span>
    <button class="btn" onclick="printReport()"
      style="background:white;color:#1a73e8;font-weight:600;padding:6px 14px;font-size:0.85rem;">
      🖨 印刷
    </button>
  </div>
</header>

<div id="printArea"></div>

<div class="container">

  <!-- 作業情報 -->
  <div class="panel">
    <div class="panel-title">作業情報</div>
    <div class="info-grid">
      <div class="info-field">
        <label>作業日</label>
        <input type="date" id="infoDate" />
      </div>
      <div class="info-field">
        <label>作業場所</label>
        <input type="text" id="infoLocation" placeholder="例：〇〇ビル 3F" />
      </div>
      <div class="info-field">
        <label>リーダー名</label>
        <input type="text" id="infoLeader" placeholder="リーダー氏名" />
      </div>
    </div>
  </div>

  <!-- 作業者追加 -->
  <div class="panel">
    <div class="panel-title">作業者を追加</div>
    <div class="add-row">
      <input type="text" id="inputName"   placeholder="作業者名 *" />
      <input type="text" id="inputVendor" placeholder="業者名（任意）" />
      <button class="btn btn-add" onclick="addWorker()">追加</button>
    </div>
  </div>

  <!-- 作業者一覧（行表示） -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">作業者一覧</div>
      <div class="bulk-actions">
        <button class="btn btn-start" onclick="startAll()">▶ 全員開始</button>
        <button class="btn btn-end"   onclick="endAll()">■ 全員終了</button>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>業者名</th>
          <th>作業者名</th>
          <th>状態</th>
          <th>経過時間</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="workersBody"></tbody>
    </table>
  </div>

  <!-- 記録ログ -->
  <div class="panel">
    <div class="log-header">
      <div class="panel-title" style="margin:0">作業記録ログ</div>
      <div class="log-actions">
        <button class="btn btn-csv"   onclick="downloadCSV()">CSVダウンロード</button>
        <button class="btn btn-clear" onclick="clearLogs()">ログ削除</button>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>業者名</th>
          <th>作業者名</th>
          <th>開始時刻</th>
          <th>終了時刻</th>
          <th>作業時間</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="logBody"></tbody>
    </table>
    <div id="emptyMsg">記録はありません</div>
  </div>

  <!-- サイン -->
  <div class="panel">
    <div class="panel-title">サイン</div>
    <div class="sign-area">
      <div class="sign-preview-wrap" id="signPreviewWrap">サインなし</div>
      <div class="sign-actions">
        <button class="btn btn-add"     onclick="openSignModal()">署名する</button>
        <button class="btn btn-outline" onclick="deleteSign()">サイン削除</button>
      </div>
    </div>
  </div>

</div>

<!-- 時刻編集モーダル -->
<div id="logEditOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:8000;align-items:center;justify-content:center;">
  <div style="background:white;border-radius:12px;padding:24px;width:90%;max-width:360px;box-shadow:0 4px 20px rgba(0,0,0,0.2);">
    <div style="font-weight:600;font-size:1rem;margin-bottom:16px;">時刻を修正</div>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div>
        <label style="font-size:0.78rem;color:#888;font-weight:600;display:block;margin-bottom:4px;">開始時刻</label>
        <input type="datetime-local" id="editStart" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:0.9rem;" />
      </div>
      <div>
        <label style="font-size:0.78rem;color:#888;font-weight:600;display:block;margin-bottom:4px;">終了時刻</label>
        <input type="datetime-local" id="editEnd" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:0.9rem;" />
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px;">
      <button class="btn btn-clear" onclick="closeLogEdit()">キャンセル</button>
      <button class="btn btn-add"   onclick="saveLogEdit()">保存</button>
    </div>
  </div>
</div>

<!-- フルスクリーン署名モーダル -->
<div id="signModal">
  <div class="sign-modal-bar">
    <span>署名</span>
    <div class="bar-actions">
      <button class="btn-ghost" onclick="closeSignModal()">キャンセル</button>
      <button class="btn-white" onclick="confirmSign()">完了</button>
    </div>
  </div>
  <div class="sign-modal-canvas-wrap">
    <canvas id="signCanvas"></canvas>
    <div class="sign-modal-hint" id="signHint">ここに署名してください</div>
  </div>
</div>

<script>
// ---- State ----
let workers = JSON.parse(localStorage.getItem('wm_workers') || '[]');
let logs    = JSON.parse(localStorage.getItem('wm_logs')    || '[]');
let info    = JSON.parse(localStorage.getItem('wm_info')    || '{}');
let timerIntervals = {};

// ---- Init ----
const today = new Date();
document.getElementById('currentDate').textContent =
  today.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });

// 作業情報の復元
document.getElementById('infoDate').value     = info.date     || today.toISOString().slice(0,10);
document.getElementById('infoLocation').value = info.location || '';
document.getElementById('infoLeader').value   = info.leader   || '';

['infoDate','infoLocation','infoLeader'].forEach(id => {
  document.getElementById(id).addEventListener('input', saveInfo);
});
document.getElementById('inputName').addEventListener('keydown',   e => { if(e.key==='Enter') addWorker(); });
document.getElementById('inputVendor').addEventListener('keydown', e => { if(e.key==='Enter') addWorker(); });

// ---- Sign / Fullscreen Modal ----
const canvas = document.getElementById('signCanvas');
const ctx    = canvas.getContext('2d');
let drawing  = false;
let lastX = 0, lastY = 0;
let signDirty = false;

function setupCanvas() {
  const ratio = window.devicePixelRatio || 1;
  const w = canvas.parentElement.clientWidth;
  const h = canvas.parentElement.clientHeight;
  canvas.width  = w * ratio;
  canvas.height = h * ratio;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(ratio, ratio);
  ctx.strokeStyle = '#111';
  ctx.lineWidth   = 3;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src  = e.touches ? e.touches[0] : e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}

canvas.addEventListener('mousedown',  e => { drawing = true; const p = getPos(e); lastX = p.x; lastY = p.y; });
canvas.addEventListener('mousemove',  e => { if (!drawing) return; drawStroke(e); });
canvas.addEventListener('mouseup',    () => { drawing = false; ctx.beginPath(); });
canvas.addEventListener('mouseleave', () => { drawing = false; ctx.beginPath(); });
canvas.addEventListener('touchstart',  e => { e.preventDefault(); drawing = true; const p = getPos(e); lastX = p.x; lastY = p.y; }, { passive: false });
canvas.addEventListener('touchmove',   e => { e.preventDefault(); if (!drawing) return; drawStroke(e); }, { passive: false });
canvas.addEventListener('touchend',    e => { e.preventDefault(); drawing = false; ctx.beginPath(); },    { passive: false });

function drawStroke(e) {
  const p = getPos(e);
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  lastX = p.x; lastY = p.y;
  signDirty = true;
  document.getElementById('signHint').style.display = 'none';
}

function openSignModal() {
  // スクロール禁止
  document.body.style.overflow = 'hidden';
  // スマホで画面回転に対応するためorientationchangeを待つ
  const modal = document.getElementById('signModal');
  modal.classList.add('open');
  signDirty = false;
  document.getElementById('signHint').style.display = '';
  // レイアウト確定後にcanvasをセットアップ
  requestAnimationFrame(() => { requestAnimationFrame(() => { setupCanvas(); }); });
}

function closeSignModal() {
  document.getElementById('signModal').classList.remove('open');
  document.body.style.overflow = '';
}

function confirmSign() {
  if (!signDirty) { alert('サインを書いてください'); return; }
  const dataUrl  = canvas.toDataURL('image/png');
  const signedAt = new Date().toISOString();
  localStorage.setItem('wm_sign',      dataUrl);
  localStorage.setItem('wm_signedAt',  signedAt);
  showSavedSign(dataUrl, signedAt);
  closeSignModal();
}

function deleteSign() {
  if (!confirm('サインを削除しますか？')) return;
  localStorage.removeItem('wm_sign');
  localStorage.removeItem('wm_signedAt');
  const wrap = document.getElementById('signPreviewWrap');
  wrap.innerHTML = 'サインなし';
}

function showSavedSign(dataUrl, signedAt) {
  const wrap = document.getElementById('signPreviewWrap');
  const dateStr = signedAt
    ? `<div style="font-size:0.75rem;color:#888;margin-top:4px;">署名日時：${new Date(signedAt).toLocaleString('ja-JP')}</div>`
    : '';
  wrap.innerHTML = `<img class="sign-preview" src="${dataUrl}" />${dateStr}`;
}

// 保存済みサインの読み込み
const savedSign     = localStorage.getItem('wm_sign');
const savedSignedAt = localStorage.getItem('wm_signedAt');
if (savedSign) showSavedSign(savedSign, savedSignedAt);

// 画面回転時にcanvasリサイズ
window.addEventListener('orientationchange', () => {
  if (document.getElementById('signModal').classList.contains('open')) {
    setTimeout(setupCanvas, 300);
  }
});
window.addEventListener('resize', () => {
  if (document.getElementById('signModal').classList.contains('open')) setupCanvas();
});

// ---- Info ----
function saveInfo() {
  info = {
    date:     document.getElementById('infoDate').value,
    location: document.getElementById('infoLocation').value,
    leader:   document.getElementById('infoLeader').value,
  };
  localStorage.setItem('wm_info', JSON.stringify(info));
}

// ---- Workers ----
function addWorker() {
  const name   = document.getElementById('inputName').value.trim();
  const vendor = document.getElementById('inputVendor').value.trim();
  if (!name) { alert('作業者名を入力してください'); return; }
  workers.push({ id: Date.now(), name, vendor, working: false, startTime: null });
  save();
  render();
  document.getElementById('inputName').value = '';
  document.getElementById('inputVendor').value = '';
  document.getElementById('inputName').focus();
}

function removeWorker(id) {
  if (workers.find(w => w.id === id)?.working) {
    if (!confirm('作業中です。削除しますか？')) return;
  }
  clearInterval(timerIntervals[id]);
  delete timerIntervals[id];
  workers = workers.filter(w => w.id !== id);
  save();
  render();
}

function startWork(id) {
  const w = workers.find(w => w.id === id);
  if (!w || w.working) return;
  w.working   = true;
  w.startTime = new Date().toISOString();
  save();
  render();
  startTimer(id);
}

function endWork(id) {
  const w = workers.find(w => w.id === id);
  if (!w || !w.working) return;
  const endTime  = new Date().toISOString();
  const duration = calcDuration(w.startTime, endTime);
  logs.unshift({ vendor: w.vendor, name: w.name, startTime: w.startTime, endTime, duration });
  w.working   = false;
  w.startTime = null;
  clearInterval(timerIntervals[id]);
  delete timerIntervals[id];
  save();
  render();
}

function startAll() { workers.forEach(w => { if (!w.working) startWork(w.id); }); }
function endAll()   { workers.forEach(w => { if (w.working)  endWork(w.id);  }); }

function startTimer(id) {
  timerIntervals[id] = setInterval(() => {
    const w  = workers.find(w => w.id === id);
    if (!w || !w.working) { clearInterval(timerIntervals[id]); return; }
    const el = document.getElementById('timer_' + id);
    if (el) el.textContent = calcDuration(w.startTime, new Date().toISOString());
  }, 1000);
}

// ---- Render ----
function render() { renderWorkers(); renderLogs(); }

function renderWorkers() {
  const tbody = document.getElementById('workersBody');
  if (workers.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="5">作業者を追加してください</td></tr>';
    return;
  }
  tbody.innerHTML = workers.map(w => `
    <tr class="${w.working ? 'working-row' : ''}">
      <td>${esc(w.vendor) || '<span style="color:#ccc">—</span>'}</td>
      <td><strong>${esc(w.name)}</strong></td>
      <td><span class="status-chip ${w.working ? 'status-working' : 'status-idle'}">${w.working ? '作業中' : '待機中'}</span></td>
      <td class="timer-cell" id="timer_${w.id}">
        ${w.working ? calcDuration(w.startTime, new Date().toISOString()) : '—'}
      </td>
      <td class="action-cell">
        <button class="btn btn-start" onclick="startWork(${w.id})" ${w.working  ? 'disabled' : ''}>開始</button>
        <button class="btn btn-end"   onclick="endWork(${w.id})"   ${!w.working ? 'disabled' : ''}>終了</button>
        <button class="btn-remove" onclick="removeWorker(${w.id})" title="削除">✕</button>
      </td>
    </tr>
  `).join('');

  workers.forEach(w => {
    if (w.working && !timerIntervals[w.id]) startTimer(w.id);
  });
}

function renderLogs() {
  const tbody = document.getElementById('logBody');
  const empty = document.getElementById('emptyMsg');
  if (logs.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  tbody.innerHTML = logs.map((l, i) => `
    <tr>
      <td>${esc(l.vendor) || '<span style="color:#ccc">—</span>'}</td>
      <td>${esc(l.name)}</td>
      <td>${formatTime(l.startTime)}</td>
      <td>${formatTime(l.endTime)}</td>
      <td><span class="duration-chip">${esc(l.duration)}</span></td>
      <td><button class="btn-remove" onclick="openLogEdit(${i})" title="時刻を修正" style="color:#aaa;font-size:0.85rem;">✎</button></td>
    </tr>
  `).join('');
}

// ---- Print ----
function printReport() {
  const sign     = localStorage.getItem('wm_sign');
  const signedAt = localStorage.getItem('wm_signedAt');
  const signedAtStr = signedAt
    ? `<div style="font-size:8pt;color:#555;margin-top:4pt;">署名日時：${new Date(signedAt).toLocaleString('ja-JP')}</div>`
    : '';
  const signHtml = sign
    ? `<img src="${sign}" />`
    : '<span style="color:#bbb;font-size:8pt;">サインなし</span>';

  const logRows = logs.length === 0
    ? '<tr><td colspan="5" style="text-align:center;color:#aaa;">記録なし</td></tr>'
    : logs.map(l => `
        <tr>
          <td>${esc(l.vendor) || '—'}</td>
          <td>${esc(l.name)}</td>
          <td>${formatTime(l.startTime)}</td>
          <td>${formatTime(l.endTime)}</td>
          <td>${esc(l.duration)}</td>
        </tr>`).join('');

  document.getElementById('printArea').innerHTML = `
    <div class="p-title">作業記録</div>

    <div class="p-section">
      <div class="p-section-title">作業情報</div>
      <div class="p-info-grid">
        <div class="p-info-item">
          <div class="p-info-label">作業日</div>
          <div class="p-info-value">${esc(info.date || '—')}</div>
        </div>
        <div class="p-info-item">
          <div class="p-info-label">作業場所</div>
          <div class="p-info-value">${esc(info.location || '—')}</div>
        </div>
        <div class="p-info-item">
          <div class="p-info-label">リーダー</div>
          <div class="p-info-value">${esc(info.leader || '—')}</div>
        </div>
      </div>
    </div>

    <div class="p-section">
      <div class="p-section-title">作業記録ログ</div>
      <table>
        <thead>
          <tr>
            <th>業者名</th><th>作業者名</th><th>開始時刻</th><th>終了時刻</th><th>作業時間</th>
          </tr>
        </thead>
        <tbody>${logRows}</tbody>
      </table>
    </div>

    <div class="p-section">
      <div class="p-section-title">サイン</div>
      <div class="p-sign-row">
        <div>
          <div class="p-sign-label">署名</div>
          <div class="p-sign-box">${signHtml}</div>
          ${signedAtStr}
        </div>
        <div style="flex:1">
          <div class="p-sign-label">リーダー名</div>
          <div style="font-size:11pt;font-weight:bold;">${esc(info.leader || '—')}</div>
        </div>
      </div>
    </div>

    <div class="p-footer">印刷日時：${new Date().toLocaleString('ja-JP')}</div>
  `;
  window.print();
}

// ---- Log Edit ----
let editingLogIdx = -1;

function toLocalDatetimeValue(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function openLogEdit(idx) {
  editingLogIdx = idx;
  const l = logs[idx];
  document.getElementById('editStart').value = toLocalDatetimeValue(l.startTime);
  document.getElementById('editEnd').value   = toLocalDatetimeValue(l.endTime);
  const ov = document.getElementById('logEditOverlay');
  ov.style.display = 'flex';
}

function closeLogEdit() {
  document.getElementById('logEditOverlay').style.display = 'none';
  editingLogIdx = -1;
}

function saveLogEdit() {
  const startVal = document.getElementById('editStart').value;
  const endVal   = document.getElementById('editEnd').value;
  if (!startVal || !endVal) { alert('開始・終了時刻を入力してください'); return; }
  const startISO = new Date(startVal).toISOString();
  const endISO   = new Date(endVal).toISOString();
  if (new Date(endISO) <= new Date(startISO)) { alert('終了時刻は開始時刻より後にしてください'); return; }
  logs[editingLogIdx].startTime = startISO;
  logs[editingLogIdx].endTime   = endISO;
  logs[editingLogIdx].duration  = calcDuration(startISO, endISO);
  save();
  render();
  closeLogEdit();
}

// ---- CSV ----
function downloadCSV() {
  if (logs.length === 0) { alert('記録がありません'); return; }
  const meta = [
    `作業日,${info.date || ''}`,
    `作業場所,${info.location || ''}`,
    `リーダー,${info.leader || ''}`,
    '',
    '業者名,作業者名,開始時刻,終了時刻,作業時間'
  ].join('\n');
  const rows = logs.map(l =>
    [l.vendor, l.name, formatTime(l.startTime), formatTime(l.endTime), l.duration]
    .map(v => `"${String(v).replace(/"/g,'""')}"`)
    .join(',')
  ).join('\n');
  const blob = new Blob(['\uFEFF' + meta + '\n' + rows], { type: 'text/csv;charset=utf-8' });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: '作業記録_' + (info.date || dateStr()) + '.csv'
  });
  a.click();
  URL.revokeObjectURL(a.href);
}

function clearLogs() {
  if (!confirm('すべての記録を削除しますか？')) return;
  logs = [];
  save();
  render();
}

// ---- Utils ----
function save() {
  localStorage.setItem('wm_workers', JSON.stringify(workers));
  localStorage.setItem('wm_logs',    JSON.stringify(logs));
}

function calcDuration(start, end) {
  const diff = Math.floor((new Date(end) - new Date(start)) / 1000);
  const h = Math.floor(diff / 3600);
  const m = Math.floor((diff % 3600) / 60);
  const s = diff % 60;
  return h > 0
    ? `${h}時間${String(m).padStart(2,'0')}分${String(s).padStart(2,'0')}秒`
    : `${m}分${String(s).padStart(2,'0')}秒`;
}

function formatTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString('ja-JP', {
    month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit'
  });
}

function dateStr() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

render();
</script>
