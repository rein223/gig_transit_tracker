<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Transit Expense Tracker</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-background: #0A0A0A;
            --color-foreground: #F5F5F3;
        }
        body {
            background-color: var(--color-background);
            color: var(--color-foreground);
        }
        /* Custom scrollbar for dark theme */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0A0A0A;
        }
        ::-webkit-scrollbar-thumb {
            background: #2A2A2A;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3A3A3A;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@19",
            "react-dom": "https://esm.sh/react-dom@19",
            "react-dom/client": "https://esm.sh/react-dom@19/client",
            "lucide-react": "https://esm.sh/lucide-react",
            "motion/react": "https://esm.sh/motion/react"
        }
    }
    </script>

    <script type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import ReactDOM from 'react-dom/client';
        import { 
            Plus, Download, Upload, Trash2, ChevronLeft, ChevronRight, 
            Train, Bus, Car, Navigation, MoreHorizontal, Calendar as CalendarIcon, 
            MapPin, JapaneseYen, Route, Bed, ArrowRight, Tag, FileText, BarChart3, Copy, Check 
        } from 'lucide-react';
        import { motion, AnimatePresence } from 'motion/react';

        // --- Constants & Types ---
        const TRANSPORTATION_METHODS = [
            '電車', 'バス', 'タクシー', '走行距離', '高速道路利用料金', '宿泊費', 'その他'
        ];
        const STORAGE_KEY = 'transit_expenses_v1';
        const CAR_REIMBURSEMENT_RATE = 20; // 20円/km
        const RECEIPT_REQUIRED_METHODS = ['タクシー', '高速道路利用料金', '宿泊費', 'その他'];

        // --- App Component ---
        function App() {
            const [expenses, setExpenses] = useState([]);
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [isClearModalOpen, setIsClearModalOpen] = useState(false);
            
            // Form state
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [departure, setDeparture] = useState('');
            const [destination, setDestination] = useState('');
            const [method, setMethod] = useState('電車');
            const [distance, setDistance] = useState('');
            const [cost, setCost] = useState('');
            const [tagId, setTagId] = useState('');
            const [note, setNote] = useState('');
            const [viewMode, setViewMode] = useState('list');
            const [filterTag, setFilterTag] = useState(null);
            const [isCopied, setIsCopied] = useState(false);

            // Auto-calculate cost for Mileage
            useEffect(() => {
                if (method === '走行距離' && distance) {
                    const calculated = Math.round(parseFloat(distance) * CAR_REIMBURSEMENT_RATE);
                    setCost(calculated.toString());
                }
            }, [method, distance]);

            // Clear distance and departure for methods that don't require them
            useEffect(() => {
                if (['電車', 'バス', 'タクシー', '宿泊費'].includes(method)) {
                    setDistance('');
                }
                if (method === '宿泊費') {
                    setDeparture('');
                }
            }, [method]);

            // Load data
            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try {
                        setExpenses(JSON.parse(saved));
                    } catch (e) {
                        console.error('Failed to load expenses', e);
                    }
                }
            }, []);

            // Save data
            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
            }, [expenses]);

            const filteredExpenses = useMemo(() => {
                return expenses.filter(e => {
                    const d = new Date(e.date);
                    const monthMatch = d.getMonth() === currentMonth.getMonth() && d.getFullYear() === currentMonth.getFullYear();
                    const tagMatch = filterTag ? e.tagId === filterTag : true;
                    return monthMatch && tagMatch;
                }).sort((a, b) => new Date(a.date).getTime() - new Date(b.date).getTime());
            }, [expenses, currentMonth, filterTag]);

            const totalCost = useMemo(() => {
                return filteredExpenses.reduce((sum, e) => sum + e.cost, 0);
            }, [filteredExpenses]);

            const totalDistance = useMemo(() => {
                return filteredExpenses.reduce((sum, e) => sum + e.distance, 0);
            }, [filteredExpenses]);

            const tagSummaries = useMemo(() => {
                const summaries = {};
                filteredExpenses.forEach(e => {
                    const tag = e.tagId || '未分類';
                    if (!summaries[tag]) {
                        summaries[tag] = { cost: 0, distance: 0, count: 0 };
                    }
                    summaries[tag].cost += e.cost;
                    summaries[tag].distance += e.distance;
                    summaries[tag].count += 1;
                });
                return Object.entries(summaries).map(([tag, data]) => ({ tag, ...data }));
            }, [filteredExpenses]);

            const dateSummaries = useMemo(() => {
                const summaries = {};
                filteredExpenses.forEach(e => {
                    if (!summaries[e.date]) {
                        summaries[e.date] = { cost: 0, count: 0 };
                    }
                    summaries[e.date].cost += e.cost;
                    summaries[e.date].count += 1;
                });
                return Object.entries(summaries).sort((a, b) => a[0].localeCompare(b[0]));
            }, [filteredExpenses]);

            const monthlySummaries = useMemo(() => {
                const summaries = {};
                expenses.forEach(e => {
                    const d = new Date(e.date);
                    const key = `${d.getFullYear()}年 ${d.getMonth() + 1}月`;
                    if (!summaries[key]) {
                        summaries[key] = { cost: 0, count: 0 };
                    }
                    summaries[key].cost += e.cost;
                    summaries[key].count += 1;
                });
                return Object.entries(summaries).sort((a, b) => {
                    const [yearA, monthA] = a[0].split('年 ').map(s => parseInt(s));
                    const [yearB, monthB] = b[0].split('年 ').map(s => parseInt(s));
                    if (yearA !== yearB) return yearB - yearA;
                    return monthB - monthA;
                });
            }, [expenses]);

            const uniqueTags = useMemo(() => {
                const tags = new Set();
                expenses.forEach(e => {
                    if (e.tagId) tags.add(e.tagId);
                });
                return Array.from(tags).sort();
            }, [expenses]);

            const groupedExpenses = useMemo(() => {
                const groups = {};
                filteredExpenses.forEach(e => {
                    if (!groups[e.date]) groups[e.date] = [];
                    groups[e.date].push(e);
                });
                return Object.entries(groups).sort((a, b) => b[0].localeCompare(a[0]));
            }, [filteredExpenses]);

            const handleAddExpense = (e) => {
                e.preventDefault();
                const newExpense = {
                    id: crypto.randomUUID(),
                    date,
                    departure,
                    destination,
                    method,
                    distance: parseFloat(distance) || 0,
                    cost: parseInt(cost) || 0,
                    tagId,
                    note
                };
                setExpenses([...expenses, newExpense]);
                setIsFormOpen(false);
                setDeparture('');
                setDestination('');
                setDistance('');
                setCost('');
                setTagId('');
                setNote('');
            };

            const handleDeleteExpense = (id) => {
                setExpenses(expenses.filter(e => e.id !== id));
            };

            const handleClearAll = () => {
                setExpenses([]);
                setIsClearModalOpen(false);
            };

            const exportToCSV = () => {
                const headers = ['日付', '出発地', '目的地', '移動手段', '距離 (km)', '金額 (円)', 'タグID', '備考', '領収書'];
                const rows = filteredExpenses.map(e => [
                    e.date,
                    `"${e.departure}"`,
                    `"${e.destination}"`,
                    e.method,
                    `${e.distance} km`,
                    `${e.cost} 円`,
                    `"${e.tagId || ''}"`,
                    `"${e.note || ''}"`,
                    RECEIPT_REQUIRED_METHODS.includes(e.method) ? '要' : '不要'
                ]);
                
                const csvContent = [
                    headers.join(','),
                    ...rows.map(r => r.join(','))
                ].join('\n');

                const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.setAttribute('href', url);
                link.setAttribute('download', `交通費精算_${currentMonth.getFullYear()}年${currentMonth.getMonth() + 1}月.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };
            
            const importFromCSV = (event) => {
                const file = event.target.files?.[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    const content = e.target?.result;
                    if (!content) return;

                    const lines = content.split('\n');
                    if (lines.length < 2) return;

                    const newExpenses = [];
                    for (let i = 1; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (!line) continue;

                        const parts = [];
                        let currentPart = '';
                        let inQuotes = false;
                        for (let j = 0; j < line.length; j++) {
                            const char = line[j];
                            if (char === '"') {
                                inQuotes = !inQuotes;
                            } else if (char === ',' && !inQuotes) {
                                parts.push(currentPart);
                                currentPart = '';
                            } else {
                                currentPart += char;
                            }
                        }
                        parts.push(currentPart);

                        if (parts.length >= 6) {
                            const [date, departure, destination, method, distance, cost, tagId, note] = parts;
                            newExpenses.push({
                                id: Math.random().toString(36).substr(2, 9),
                                date: date.trim(),
                                departure: departure.trim(),
                                destination: destination.trim(),
                                method: method.trim(),
                                distance: parseFloat(distance) || 0,
                                cost: parseInt(cost) || 0,
                                tagId: tagId?.trim() || undefined,
                                note: note?.trim() || undefined
                            });
                        }
                    }

                    if (newExpenses.length > 0) {
                        setExpenses(prev => [...prev, ...newExpenses]);
                        alert(`${newExpenses.length}件のデータをインポートしました。`);
                    }
                    event.target.value = '';
                };
                reader.readAsText(file);
            };

            const changeMonth = (offset) => {
                const next = new Date(currentMonth);
                next.setMonth(next.getMonth() + offset);
                setCurrentMonth(next);
            };

            const copySummaryToClipboard = () => {
                const monthStr = `${currentMonth.getFullYear()}年${currentMonth.getMonth() + 1}月`;
                const expensesWithTags = filteredExpenses.filter(e => e.tagId);
                
                if (expensesWithTags.length === 0) {
                    alert('タグに紐づいたデータがありません。');
                    return;
                }

                const taggedTotalCost = expensesWithTags.reduce((sum, e) => sum + e.cost, 0);
                const taggedTotalDistance = expensesWithTags.reduce((sum, e) => sum + e.distance, 0);

                let text = `【交通費精算レポート（タグ別明細） - ${monthStr}】\n`;
                text += `タグ紐付け合計金額: ${taggedTotalCost.toLocaleString()} 円\n`;
                text += `タグ紐付け合計距離: ${taggedTotalDistance.toFixed(1)} km\n`;
                text += `対象件数: ${expensesWithTags.length} 件\n\n`;
                
                tagSummaries.forEach(s => {
                    const tagExpenses = expensesWithTags.filter(e => e.tagId === s.tag);
                    if (tagExpenses.length > 0) {
                        text += `■ タグ: ${s.tag}\n`;
                        text += `   小計: ${s.cost.toLocaleString()} 円 (${s.count}件)\n`;
                        text += `   明細:\n`;
                        tagExpenses.sort((a, b) => new Date(a.date).getTime() - new Date(b.date).getTime()).forEach(e => {
                            const distanceStr = e.distance > 0 ? ` (${e.distance.toFixed(1)}km)` : '';
                            const receiptStr = RECEIPT_REQUIRED_METHODS.includes(e.method) ? ' [領収書要]' : '';
                            text += `   - ${e.date} | ${e.departure} → ${e.destination} | ${e.method}${distanceStr}${receiptStr} | ${e.cost.toLocaleString()}円\n`;
                            if (e.note) text += `     備考: ${e.note}\n`;
                        });
                        text += `\n`;
                    }
                });

                navigator.clipboard.writeText(text).then(() => {
                    setIsCopied(true);
                    setTimeout(() => setIsCopied(false), 2000);
                });
            };

            const getMethodIcon = (m) => {
                switch (m) {
                    case '電車': return React.createElement(Train, { size: 16 });
                    case 'バス': return React.createElement(Bus, { size: 16 });
                    case 'タクシー': return React.createElement(Car, { size: 16, className: "text-yellow-500" });
                    case '走行距離': return React.createElement(Car, { size: 16 });
                    case '高速道路利用料金': return React.createElement(Route, { size: 16 });
                    case '宿泊費': return React.createElement(Bed, { size: 16 });
                    default: return React.createElement(MoreHorizontal, { size: 16 });
                }
            };

            return React.createElement('div', { className: "min-h-screen bg-[#0A0A0A] text-[#F5F5F3] font-sans selection:bg-white selection:text-black" }, [
                // Header
                React.createElement('header', { key: "header", className: "border-b border-white/10 bg-[#0A0A0A]/80 backdrop-blur-md sticky top-0 z-30" }, 
                    React.createElement('div', { className: "max-w-7xl mx-auto px-4 md:px-6 py-4 md:h-20 flex flex-col md:flex-row md:items-center justify-between gap-4" }, [
                        React.createElement('div', { key: "logo", className: "flex items-center justify-between md:justify-start gap-3" }, [
                            React.createElement('div', { className: "flex items-center gap-3" }, [
                                React.createElement('div', { key: "icon", className: "w-10 h-10 bg-white rounded-full flex items-center justify-center text-black" }, 
                                    React.createElement(Navigation, { size: 20 })
                                ),
                                React.createElement('h1', { key: "title", className: "text-xl font-semibold tracking-tight" }, "交通費トラッカー")
                            ]),
                            // Mobile Month Nav
                            React.createElement('div', { key: "mobile-month-nav", className: "flex md:hidden items-center bg-white/5 rounded-full p-0.5" }, [
                                React.createElement('button', { key: "prev", onClick: () => changeMonth(-1), className: "p-1.5 hover:bg-white/10 rounded-full transition-colors" }, React.createElement(ChevronLeft, { size: 16 })),
                                React.createElement('span', { key: "current", className: "px-2 text-xs font-medium min-w-[80px] text-center" }, `${currentMonth.getFullYear()}/${currentMonth.getMonth() + 1}`),
                                React.createElement('button', { key: "next", onClick: () => changeMonth(1), className: "p-1.5 hover:bg-white/10 rounded-full transition-colors" }, React.createElement(ChevronRight, { size: 16 }))
                            ])
                        ]),
                        React.createElement('div', { key: "actions", className: "flex items-center justify-between md:justify-end gap-2 md:gap-4" }, [
                            React.createElement('div', { key: "desktop-month-nav", className: "hidden md:flex items-center bg-white/5 rounded-full p-1" }, [
                                React.createElement('button', { key: "prev", onClick: () => changeMonth(-1), className: "p-2 hover:bg-white/10 rounded-full transition-colors" }, React.createElement(ChevronLeft, { size: 18 })),
                                React.createElement('span', { key: "current", className: "px-4 font-medium min-w-[120px] text-center" }, `${currentMonth.getFullYear()}年 ${currentMonth.getMonth() + 1}月`),
                                React.createElement('button', { key: "next", onClick: () => changeMonth(1), className: "p-2 hover:bg-white/10 rounded-full transition-colors" }, React.createElement(ChevronRight, { size: 18 }))
                            ]),
                            React.createElement('button', { key: "export", onClick: exportToCSV, disabled: filteredExpenses.length === 0, className: "flex-1 md:flex-none flex items-center justify-center gap-2 px-3 md:px-4 py-2 bg-[#141414] border border-white/10 rounded-full text-xs md:text-sm font-medium hover:bg-white hover:text-black transition-all disabled:opacity-50" }, [
                                React.createElement(Download, { size: 14 }),
                                React.createElement('span', { className: "hidden sm:inline" }, "CSV出力"),
                                React.createElement('span', { className: "sm:hidden" }, "出力")
                            ]),
                            React.createElement('label', { key: "import", className: "flex-1 md:flex-none flex items-center justify-center gap-2 px-3 md:px-4 py-2 bg-[#141414] border border-white/10 rounded-full text-xs md:text-sm font-medium hover:bg-white hover:text-black transition-all cursor-pointer" }, [
                                React.createElement(Upload, { size: 14 }),
                                React.createElement('span', { className: "hidden sm:inline" }, "CSVインポート"),
                                React.createElement('span', { className: "sm:hidden" }, "読込"),
                                React.createElement('input', { key: "file", type: "file", accept: ".csv", onChange: importFromCSV, className: "hidden" })
                            ])
                        ])
                    ])
                ),

                React.createElement('main', { key: "main", className: "max-w-7xl mx-auto px-6 py-12" }, [
                    // Stats Grid
                    React.createElement('div', { key: "stats", className: "grid grid-cols-1 md:grid-cols-3 gap-6 mb-12" }, [
                        React.createElement(motion.div, { key: "cost", initial: { opacity: 0, y: 20 }, animate: { opacity: 1, y: 0 }, className: "bg-[#141414] p-8 rounded-3xl border border-white/5 shadow-sm" }, [
                            React.createElement('p', { className: "text-xs uppercase tracking-widest text-white/50 font-bold mb-2" }, "合計金額"),
                            React.createElement('p', { className: "text-4xl font-light tracking-tighter" }, [totalCost.toLocaleString(), React.createElement('span', { className: "text-xl" }, " 円")])
                        ]),
                        React.createElement(motion.div, { key: "distance", initial: { opacity: 0, y: 20 }, animate: { opacity: 1, y: 0 }, transition: { delay: 0.1 }, className: "bg-[#141414] p-8 rounded-3xl border border-white/5 shadow-sm" }, [
                            React.createElement('p', { className: "text-xs uppercase tracking-widest text-white/50 font-bold mb-2" }, "合計距離"),
                            React.createElement('p', { className: "text-4xl font-light tracking-tighter" }, [totalDistance.toFixed(1), React.createElement('span', { className: "text-xl" }, " km")])
                        ]),
                        React.createElement(motion.div, { key: "count", initial: { opacity: 0, y: 20 }, animate: { opacity: 1, y: 0 }, transition: { delay: 0.2 }, className: "bg-white p-8 rounded-3xl text-black shadow-xl flex flex-col justify-between" }, [
                            React.createElement('div', {}, [
                                React.createElement('p', { className: "text-xs uppercase tracking-widest opacity-50 font-bold mb-2 text-black/50" }, "登録件数"),
                                React.createElement('p', { className: "text-4xl font-light tracking-tighter" }, filteredExpenses.length)
                            ]),
                            React.createElement('button', { onClick: () => setIsFormOpen(true), className: "mt-4 flex items-center justify-center gap-2 w-full py-3 bg-black text-white rounded-2xl font-bold hover:scale-[1.02] active:scale-[0.98] transition-all" }, [
                                React.createElement(Plus, { size: 20 }),
                                "新規登録"
                            ])
                        ])
                    ]),

                    // View Toggle
                    React.createElement('div', { key: "toggle", className: "flex flex-wrap items-center justify-between gap-4 mb-8" }, [
                        React.createElement('div', { className: "flex gap-4" }, [
                            React.createElement('button', { onClick: () => setViewMode('list'), className: `flex items-center gap-2 px-6 py-3 rounded-2xl font-bold transition-all ${viewMode === 'list' ? 'bg-white text-black shadow-lg' : 'bg-[#141414] text-white/40 hover:bg-white/5'}` }, [
                                React.createElement(FileText, { size: 18 }),
                                "明細一覧"
                            ]),
                            React.createElement('button', { onClick: () => setViewMode('summary'), className: `flex items-center gap-2 px-6 py-3 rounded-2xl font-bold transition-all ${viewMode === 'summary' ? 'bg-white text-black shadow-lg' : 'bg-[#141414] text-white/40 hover:bg-white/5'}` }, [
                                React.createElement(BarChart3, { size: 18 }),
                                "集計レポート"
                            ])
                        ]),
                        React.createElement('div', { className: "flex items-center gap-4" }, [
                            viewMode === 'summary' && React.createElement('button', { onClick: copySummaryToClipboard, className: "flex items-center gap-2 px-4 py-2 bg-[#141414] border border-white/10 rounded-full text-sm font-medium hover:bg-white hover:text-black transition-all" }, [
                                isCopied ? React.createElement(Check, { size: 16, className: "text-green-500" }) : React.createElement(Copy, { size: 16 }),
                                isCopied ? 'コピー完了' : 'レポートをコピー'
                            ]),
                            filterTag && React.createElement(motion.div, { initial: { opacity: 0, x: 20 }, animate: { opacity: 1, x: 0 }, className: "flex items-center gap-3 px-4 py-2 bg-white/5 rounded-full border border-white/10" }, [
                                React.createElement('span', { className: "text-[10px] uppercase tracking-widest font-bold text-white/40" }, "フィルタ中:"),
                                React.createElement('span', { className: "flex items-center gap-1 text-sm font-bold" }, [React.createElement(Tag, { size: 12 }), filterTag]),
                                React.createElement('button', { onClick: () => setFilterTag(null), className: "p-1 hover:bg-white/10 rounded-full transition-colors" }, React.createElement(Plus, { size: 14, className: "rotate-45" }))
                            ])
                        ])
                    ]),

                    viewMode === 'list' ? 
                        React.createElement('div', { key: "list", className: "bg-[#141414] rounded-[2rem] border border-white/5 shadow-sm overflow-hidden" }, [
                            React.createElement('div', { className: "p-8 border-b border-white/5 flex items-center justify-between" }, [
                                React.createElement('div', { className: "flex items-center gap-4" }, [
                                    React.createElement('h2', { className: "text-lg font-semibold" }, "月間ログ"),
                                    React.createElement('span', { className: "text-sm text-white/40 font-medium" }, `${filteredExpenses.length} 件のデータ`)
                                ]),
                                expenses.length > 0 && React.createElement('button', { onClick: () => setIsClearModalOpen(true), className: "flex items-center gap-2 px-4 py-2 text-red-500/60 hover:text-red-500 hover:bg-red-500/10 rounded-full text-xs font-bold uppercase tracking-widest transition-all" }, [
                                    React.createElement(Trash2, { size: 14 }),
                                    "全データ削除"
                                ])
                            ]),
                            React.createElement('div', { className: "overflow-x-auto" }, 
                                React.createElement('table', { className: "w-full text-left border-collapse" }, [
                                    React.createElement('thead', {}, 
                                        React.createElement('tr', { className: "border-b border-white/5 bg-[#1F1F1F]" }, [
                                            React.createElement('th', { className: "px-8 py-4 text-[10px] uppercase tracking-widest font-bold text-white/40" }, "区間 (出発地 → 目的地) / 備考"),
                                            React.createElement('th', { className: "px-8 py-4 text-[10px] uppercase tracking-widest font-bold text-white/40" }, "手段"),
                                            React.createElement('th', { className: "px-8 py-4 text-[10px] uppercase tracking-widest font-bold text-white/40" }, "タグ"),
                                            React.createElement('th', { className: "px-8 py-4 text-[10px] uppercase tracking-widest font-bold text-white/40 text-right" }, "距離"),
                                            React.createElement('th', { className: "px-8 py-4 text-[10px] uppercase tracking-widest font-bold text-white/40 text-right" }, "金額"),
